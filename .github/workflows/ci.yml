name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check src/

      - name: Import sanity (24 신규 모듈)
        env:
          PYTHONPATH: src
        run: |
          python -c "
          import sys
          mods = [
              'sajucandle.signal.engine', 'sajucandle.signal.regime', 'sajucandle.signal.renderer',
              'sajucandle.api.main', 'sajucandle.scheduler.runner',
              'sajucandle.quant.backtest', 'sajucandle.quant.ranker', 'sajucandle.quant.technical',
              'sajucandle.quant.price_data', 'sajucandle.quant.macro', 'sajucandle.quant.crypto_macro',
              'sajucandle.quant.fundamental', 'sajucandle.quant.onchain', 'sajucandle.quant.null_test',
              'sajucandle.quant.saju_calibrator',
              'sajucandle.saju.scorer', 'sajucandle.saju.daeun', 'sajucandle.saju.sewoon',
              'sajucandle.saju.shinsal', 'sajucandle.saju.tengod', 'sajucandle.saju.relations',
              'sajucandle.manseryeok.core',
              'sajucandle.ticker.loader', 'sajucandle.ticker.saju_resolver',
          ]
          fail = 0
          for m in mods:
              try:
                  __import__(m)
              except Exception as e:
                  print(f'FAIL {m}: {type(e).__name__}: {e}')
                  fail += 1
          if fail:
              sys.exit(1)
          print(f'{len(mods)} modules imported OK')
          "

      - name: FastAPI boot (health check)
        env:
          PYTHONPATH: src
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from sajucandle.api.main import app
          with TestClient(app) as c:
              r = c.get('/health')
              assert r.status_code == 200, r.text
              print('GET /health ->', r.status_code, r.json())
          "
