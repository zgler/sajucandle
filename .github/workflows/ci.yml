name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check src/ tests/

      - name: Pytest (DB 통합 테스트는 TEST_DATABASE_URL 없어 skip)
        run: pytest -q
        # TEST_DATABASE_URL 미주입 → DB integration 테스트는 자동 skip (conftest.py)
