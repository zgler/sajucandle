[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# startCommand는 각 서비스 Dashboard에서 개별 지정.
# - sajucandle-api:       uvicorn sajucandle.api.main:app --host 0.0.0.0 --port $PORT
# - sajucandle-scheduler: python -m sajucandle.scheduler.runner --daemon
[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
